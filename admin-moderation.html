<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moderation des soumissions | AppliManagement</title>
    <meta name="robots" content="noindex, nofollow">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 text-slate-900">
    <main class="max-w-6xl mx-auto px-4 py-10">
        <h1 class="text-3xl font-extrabold mb-2">Moderation des applications</h1>
        <p class="text-slate-600 mb-8">Validez une soumission pour la publier automatiquement sur la plateforme.</p>

        <div class="bg-white border border-slate-200 rounded-2xl p-4 mb-6">
            <label for="admin-token" class="block text-sm font-semibold mb-2">Token admin</label>
            <input id="admin-token" type="password" class="w-full rounded-xl border border-slate-300 px-4 py-3" placeholder="Coller le token ADMIN_TOKEN">
            <button id="load-pending" class="mt-3 rounded-xl bg-slate-900 text-white px-4 py-2.5 font-semibold hover:bg-slate-800">Charger les soumissions en attente</button>
        </div>

        <div id="pending-list" class="space-y-4"></div>
        <p id="pending-empty" class="hidden text-slate-500">Aucune soumission en attente.</p>
    </main>

    <script>
        const tokenInput = document.getElementById("admin-token");
        const loadButton = document.getElementById("load-pending");
        const pendingList = document.getElementById("pending-list");
        const empty = document.getElementById("pending-empty");

        function esc(value) {
            return (value || "")
                .replaceAll("&", "&amp;")
                .replaceAll("<", "&lt;")
                .replaceAll(">", "&gt;");
        }

        function normalizeAdminToken(raw) {
            let t = (raw || "").trim();
            if (/^bearer\s+/i.test(t)) {
                t = t.replace(/^bearer\s+/i, "").trim();
            }
            return t;
        }

        async function loadPending() {
            pendingList.innerHTML = "";
            empty.classList.remove("hidden", "text-red-600", "text-slate-500");
            empty.classList.add("hidden");
            const token = normalizeAdminToken(tokenInput.value);
            if (!token) return;

            const response = await fetch("/api/submissions?status=pending", {
                headers: { "Authorization": `Bearer ${token}` }
            });

            if (!response.ok) {
                empty.classList.remove("hidden");
                empty.classList.add("text-red-600");
                let detail = `Erreur HTTP ${response.status}.`;
                try {
                    const err = await response.json();
                    if (err && err.detail) detail += ` ${err.detail}`;
                    else if (err && err.error) detail += ` ${err.error}`;
                } catch (e) {
                    /* ignore */
                }
                if (response.status === 401) {
                    detail += " Verifiez que le champ correspond exactement au secret ADMIN_TOKEN dans Cloudflare Pages (Production), puis redeploy.";
                }
                empty.textContent = detail;
                return;
            }

            empty.classList.remove("text-red-600");
            empty.classList.add("text-slate-500");

            const list = await response.json();
            if (!Array.isArray(list) || list.length === 0) {
                empty.classList.remove("hidden");
                empty.textContent = "Aucune soumission en attente.";
                return;
            }

            empty.classList.add("hidden");

            pendingList.innerHTML = list.map((item) => `
                <article class="bg-white border border-slate-200 rounded-2xl p-5">
                    <h2 class="font-bold text-lg mb-2">${esc(item.app_name)}</h2>
                    <p class="text-sm text-slate-500 mb-1">Createur: ${esc(item.creator_name)}</p>
                    <p class="text-sm text-slate-500 mb-1">Categorie: ${esc(item.category)}</p>
                    <p class="text-sm text-slate-500 mb-3">Plateforme: ${esc(item.platform)}</p>
                    ${(item.screenshot_link || item.logo_link) ? `
                    <a href="${esc(item.screenshot_link || item.logo_link)}" target="_blank" rel="noopener noreferrer" class="text-blue-600 underline text-sm block mb-2">Voir le screenshot</a>
                    ` : ""}
                    <p class="text-sm text-slate-700 mb-3">${esc(item.description)}</p>
                    <a href="${esc(item.app_link)}" target="_blank" rel="noopener noreferrer" class="text-blue-600 underline text-sm">Voir le lien</a>
                    <div class="mt-4 flex gap-2">
                        <button data-id="${esc(item.id)}" class="approve-btn rounded-xl bg-emerald-600 text-white px-4 py-2 text-sm font-semibold hover:bg-emerald-700">Valider et publier</button>
                    </div>
                </article>
            `).join("");

            document.querySelectorAll(".approve-btn").forEach((button) => {
                button.addEventListener("click", async () => {
                    const id = button.getAttribute("data-id");
                    button.disabled = true;
                    const approveResponse = await fetch(`/api/submissions/${id}/approve`, {
                        method: "POST",
                        headers: { "Authorization": `Bearer ${normalizeAdminToken(tokenInput.value)}` }
                    });
                    if (approveResponse.ok) {
                        await loadPending();
                    } else {
                        button.disabled = false;
                        alert("Erreur de validation.");
                    }
                });
            });
        }

        loadButton.addEventListener("click", loadPending);
    </script>
</body>
</html>
