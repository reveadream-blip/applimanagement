# Pages (site + functions/). Pour CI Git, si une "Deploy command" est imposee :
#   npx wrangler pages deploy .
# NE PAS utiliser : npx wrangler deploy (reserve aux Workers sans assets Pages).
#
# Dev local : npx wrangler pages dev .
# Liaisons KV + secret ADMIN_TOKEN : Dashboard Cloudflare → ton projet Pages → Parametres → Functions

name = "applimanagement"
compatibility_date = "2026-04-27"
pages_build_output_dir = "."

[[kv_namespaces]]
binding = "APPS_KV"
id = "6feac490e02b4ee68b4c5edfaf591487"
