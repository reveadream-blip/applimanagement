# Optionnel : developpement local avec "npx wrangler pages dev ."
# En production (Pages + Git) : pas besoin de commande wrangler dans le build.
# Liaisons KV + secret ADMIN_TOKEN : Dashboard Cloudflare → ton projet Pages → Parametres → Functions

name = "applimanagement"
compatibility_date = "2026-04-27"
pages_build_output_dir = "."

[[kv_namespaces]]
binding = "APPS_KV"
id = "REMPLACEZ_PAR_VOTRE_KV_NAMESPACE_ID"
