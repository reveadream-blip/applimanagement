<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Listing Platform | AppliManagement</title>
    <meta name="description" content="Discover approved applications listed on AppliManagement.">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://applimanagement.com/app-listing-platform.html">
    <link rel="icon" type="image/png" sizes="96x96" href="https://applimanagement.com/favicon.png?v=2">
    <link rel="apple-touch-icon" href="https://applimanagement.com/favicon.png?v=2">
    <link rel="shortcut icon" type="image/png" href="https://applimanagement.com/favicon.png?v=2">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-900">
    <nav class="border-b border-slate-200 bg-white">
        <div class="max-w-6xl mx-auto px-4 py-4 flex items-center justify-between">
            <a href="index-en.html" class="flex items-center gap-3 font-bold text-lg">
                <img src="https://applimanagement.com/AppliManagement.png" alt="AppliManagement" class="h-9 w-auto">
                <span>AppliManagement</span>
            </a>
            <div class="flex items-center gap-3">
                <div class="inline-flex items-center gap-1 rounded-full bg-slate-100 border border-slate-200 p-1 text-xs font-bold uppercase tracking-wide">
                    <a href="plateforme-referencement.html" class="px-2.5 py-1 rounded-full text-slate-500 hover:bg-white">FR</a>
                    <a href="app-listing-platform.html" class="px-2.5 py-1 rounded-full bg-slate-900 text-white">EN</a>
                </div>
                <a href="submit-app.html" class="text-sm font-semibold bg-blue-600 text-white px-4 py-2 rounded-xl hover:bg-blue-700">Submit an app</a>
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-4 py-10">
        <header class="mb-8">
            <h1 class="text-3xl md:text-4xl font-extrabold mb-3">App Listing Platform</h1>
            <p class="text-slate-600">Apps are automatically published here after admin approval.</p>
        </header>

        <section class="mb-6">
            <div class="max-w-sm">
                <label for="category-filter" class="block text-sm font-semibold mb-2">Filter by category</label>
                <select id="category-filter" class="w-full rounded-xl border border-slate-300 px-4 py-2.5 bg-white">
                    <option value="all">All categories</option>
                </select>
            </div>
        </section>

        <div id="apps-grid" class="grid md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        <p id="empty-state" class="hidden mt-8 text-slate-500">No published app yet.</p>
        <div id="pagination" class="hidden mt-8 flex items-center justify-center gap-2">
            <button id="prev-page" class="rounded-lg border border-slate-300 px-3 py-1.5 text-sm hover:bg-slate-50">Previous</button>
            <span id="page-indicator" class="text-sm text-slate-600"></span>
            <button id="next-page" class="rounded-lg border border-slate-300 px-3 py-1.5 text-sm hover:bg-slate-50">Next</button>
        </div>
    </main>

    <script>
        const grid = document.getElementById("apps-grid");
        const emptyState = document.getElementById("empty-state");
        const categoryFilter = document.getElementById("category-filter");
        const pagination = document.getElementById("pagination");
        const prevPageBtn = document.getElementById("prev-page");
        const nextPageBtn = document.getElementById("next-page");
        const pageIndicator = document.getElementById("page-indicator");
        const PAGE_SIZE = 10;
        let allApps = [];
        let filteredApps = [];
        let currentPage = 1;
        const CATEGORY_OPTIONS = [
            { value: "all", label: "All categories" },
            { value: "art-design", label: "Art & Design" },
            { value: "auto-vehicles", label: "Auto & Vehicles" },
            { value: "game-adventure", label: "Game - Adventure" },
            { value: "game-action", label: "Game - Action" },
            { value: "game-arcade", label: "Game - Arcade" },
            { value: "game-card", label: "Game - Card" },
            { value: "game-casino", label: "Game - Casino" },
            { value: "game-puzzle", label: "Game - Puzzle" },
            { value: "game-racing", label: "Game - Racing" },
            { value: "game-role-playing", label: "Game - Role Playing" },
            { value: "game-simulation", label: "Game - Simulation" },
            { value: "game-sports", label: "Game - Sports" },
            { value: "game-strategy", label: "Game - Strategy" },
            { value: "game-music", label: "Game - Music" },
            { value: "game-trivia", label: "Game - Trivia" },
            { value: "game-kids", label: "Game - Kids" },
            { value: "business", label: "Business" },
            { value: "communication", label: "Communication" },
            { value: "finance", label: "Finance" },
            { value: "lifestyle", label: "Lifestyle" },
            { value: "shopping", label: "Shopping" },
            { value: "food-drink", label: "Food & Drink" },
            { value: "travel-local", label: "Travel & Local" },
            { value: "maps-navigation", label: "Maps & Navigation" },
            { value: "news-magazines", label: "News & Magazines" },
            { value: "books-reference", label: "Books & Reference" },
            { value: "entertainment", label: "Entertainment" },
            { value: "music-audio", label: "Music & Audio" },
            { value: "photo-video", label: "Photo & Video" },
            { value: "productivity", label: "Productivity" },
            { value: "education", label: "Education" },
            { value: "health", label: "Health" },
            { value: "sports-fitness", label: "Sports & Fitness" },
            { value: "utilities", label: "Utilities" },
            { value: "weather", label: "Weather" },
            { value: "parenting", label: "Parenting" },
            { value: "medical", label: "Medical" },
            { value: "social", label: "Social" },
            { value: "other", label: "Other" },
            { value: "jeu", label: "Game (legacy category)" }
        ];

        function escapeHtml(value) {
            return (value || "")
                .replaceAll("&", "&amp;")
                .replaceAll("<", "&lt;")
                .replaceAll(">", "&gt;")
                .replaceAll('"', "&quot;")
                .replaceAll("'", "&#039;");
        }

        function populateCategoryFilter() {
            categoryFilter.innerHTML = CATEGORY_OPTIONS
                .map((category) => `<option value="${escapeHtml(category.value)}">${escapeHtml(category.label)}</option>`)
                .join("");
        }

        function applyFilterAndRender() {
            const selected = categoryFilter.value;
            filteredApps = selected === "all"
                ? allApps
                : allApps.filter((app) => (app.category || "") === selected);
            currentPage = 1;
            renderPage();
        }

        function renderPage() {
            grid.innerHTML = "";
            emptyState.classList.add("hidden");
            pagination.classList.add("hidden");

            if (!Array.isArray(filteredApps) || filteredApps.length === 0) {
                emptyState.classList.remove("hidden");
                return;
            }

            const totalPages = Math.max(1, Math.ceil(filteredApps.length / PAGE_SIZE));
            if (currentPage > totalPages) currentPage = totalPages;
            const start = (currentPage - 1) * PAGE_SIZE;
            const pageApps = filteredApps.slice(start, start + PAGE_SIZE);

            grid.innerHTML = pageApps.map((app) => `
                <article class="bg-white border border-slate-200 rounded-2xl p-5 shadow-sm">
                    ${app.screenshot_link || app.logo_link ? `
                    <div class="mb-4 overflow-hidden rounded-xl border border-slate-200 bg-slate-100">
                        <img src="${escapeHtml(app.screenshot_link || app.logo_link)}" alt="${escapeHtml(app.app_name)} screenshot" class="w-full h-44 object-cover">
                    </div>
                    ` : ""}
                    <div class="flex items-center justify-between gap-2 mb-3">
                        <h2 class="font-bold text-lg">${escapeHtml(app.app_name)}</h2>
                        <span class="text-xs px-2 py-1 rounded-full bg-slate-100 text-slate-600">${escapeHtml(app.platform)}</span>
                    </div>
                    <p class="text-sm text-slate-500 mb-3">${escapeHtml(app.category)}</p>
                    <p class="text-slate-700 text-sm leading-relaxed mb-4">${escapeHtml(app.description)}</p>
                    <p class="text-xs text-slate-500 mb-4">By ${escapeHtml(app.creator_name)}</p>
                    <a href="${escapeHtml(app.app_link)}" target="_blank" rel="noopener noreferrer" class="inline-flex items-center justify-center w-full rounded-xl bg-blue-600 text-white font-semibold py-2.5 hover:bg-blue-700 transition">
                        Open app
                    </a>
                </article>
            `).join("");

            if (totalPages > 1) {
                pagination.classList.remove("hidden");
                pageIndicator.textContent = `Page ${currentPage} / ${totalPages}`;
                prevPageBtn.disabled = currentPage === 1;
                nextPageBtn.disabled = currentPage === totalPages;
                prevPageBtn.classList.toggle("opacity-50", currentPage === 1);
                nextPageBtn.classList.toggle("opacity-50", currentPage === totalPages);
            }
        }

        async function loadApps() {
            try {
                const response = await fetch("/api/apps");
                if (!response.ok) throw new Error("Load error");
                allApps = await response.json();
                if (!Array.isArray(allApps)) allApps = [];
                populateCategoryFilter();
                filteredApps = allApps;
                renderPage();
            } catch (error) {
                emptyState.classList.remove("hidden");
                emptyState.textContent = "Unable to load apps right now.";
            }
        }

        categoryFilter.addEventListener("change", applyFilterAndRender);
        prevPageBtn.addEventListener("click", () => {
            if (currentPage > 1) {
                currentPage -= 1;
                renderPage();
            }
        });
        nextPageBtn.addEventListener("click", () => {
            const totalPages = Math.max(1, Math.ceil(filteredApps.length / PAGE_SIZE));
            if (currentPage < totalPages) {
                currentPage += 1;
                renderPage();
            }
        });

        loadApps();
    </script>
</body>
</html>
